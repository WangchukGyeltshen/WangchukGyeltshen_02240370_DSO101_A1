name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      RENDER_BE_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BE_DEPLOY_HOOK_URL }}
      RENDER_FE_DEPLOY_HOOK_URL: ${{ secrets.RENDER_FE_DEPLOY_HOOK_URL }}

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Build & Push Backend Image
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./BE
          file: ./BE/dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/be-todo:latest

      # 5. Build & Push Frontend Image
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./FE
          file: ./FE/dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fe-todo:latest
          build-args: |
            NEXT_PUBLIC_API_BASE=${{ secrets.NEXT_PUBLIC_API_BASE }}

      # 6. Trigger Render Redeployment via Webhook (optional)
      - name: Trigger Render Backend Deployment
        if: env.RENDER_BE_DEPLOY_HOOK_URL != ''
        run: curl -X POST ${{ env.RENDER_BE_DEPLOY_HOOK_URL }}

      - name: Trigger Render Frontend Deployment
        if: env.RENDER_FE_DEPLOY_HOOK_URL != ''
        run: curl -X POST ${{ env.RENDER_FE_DEPLOY_HOOK_URL }}