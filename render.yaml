services:
  - type: web
    name: be-todo
    env: docker
    dockerfilePath: ./BE/dockerfile
    envVars:
      - key: MONGODB_URI
        value: your-mongodb-connection-string
      - key: PORT
        value: 5000
      - key: FRONTEND_ORIGIN
        value: https://fe-todo.onrender.com
      - key: JWT_SECRET
        value: replace-with-strong-secret

  - type: web
    name: fe-todo
    env: docker
    dockerfilePath: ./FE/dockerfile
    envVars:
      - key: NEXT_PUBLIC_API_BASE
        value: https://be-todo.onrender.com